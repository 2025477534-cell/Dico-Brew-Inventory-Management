<main class="max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8"><div class="border-b pb-4 mb-6"><h2 class="text-xl font-bold">Partner Suppliers Directory</h2><p class="text-xs text-stone-600">Verified suppliers for Dico Brew operation.</p></div><div id="supplier-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div></main><footer class="bg-stone-900/90 text-stone-400 text-xs py-6 mt-auto"><div class="max-w-7xl mx-auto px-4 text-center">&copy; 2026 Dico Brew by Intan Najuwa &bull; IMS566 Project Framework</div></footer></div>
<script>
const periodLabels={current:'July 2026',june:'June 2026',may:'May 2026',april:'April 2026',march:'March 2026',february:'February 2026',january:'January 2026'};
const periodOrder=['january','february','march','april','may','june','current'];
const defaultAllMonthsData={
current:[
{id:1,name:'Coffee Beans (Arabica)',category:'Coffee Beans',price:45,qty:25,soldThisMonth:142,desc:'Whole roasted beans, 1kg bag.',image:'coffee_beans.jpg'},
{id:2,name:'Caramel Syrup',category:'Syrups',price:18,qty:15,soldThisMonth:68,desc:'Flavoring syrup, 750ml bottle.',image:'caramel_syrup.jpg'},
{id:3,name:'Vanilla Syrup',category:'Syrups',price:17.5,qty:4,soldThisMonth:35,desc:'Flavoring syrup, 750ml bottle.',image:'vanilla_syrup.jpg'},
{id:4,name:'Fresh Milk',category:'Dairy / Milk',price:8.5,qty:20,soldThisMonth:235,desc:'Full cream dairy milk, 1L carton.',image:'fresh_milk.jpg'},
{id:5,name:'Chocolate Sauce',category:'Syrups',price:22,qty:12,soldThisMonth:90,desc:'Rich cocoa drizzle sauce, 1kg bottle.',image:'chocolate_sauce.jpg'},
{id:6,name:'White Sugar',category:'Ingredients',price:4,qty:35,soldThisMonth:45,desc:'Fine granulated sugar, 1kg pack.',image:'white_sugar.jpg'},
{id:7,name:'Disposable Cups (16oz)',category:'Supplies',price:15,qty:3,soldThisMonth:110,desc:'Takeaway paper cups, sleeve of 50.',image:'disposable_cups.jpg'},
{id:8,name:'Matcha Powder',category:'Ingredients',price:60,qty:18,soldThisMonth:55,desc:'Premium green tea powder, 500g.',image:'matcha_powder.jpg'},
{id:9,name:'Wheat Flour',category:'Ingredients',price:5.5,qty:30,soldThisMonth:38,desc:'Superfine wheat flour, 1kg pack.',image:'default_item.jpg'},
{id:10,name:'Croissants (Pack of 6)',category:'Pastries',price:28,qty:8,soldThisMonth:64,desc:'Fresh butter croissants, pack of 6.',image:'croissant.jpg'}],
june:[],may:[],april:[],march:[],february:[],january:[]};
const baseQty={june:2,may:5,april:-1,march:-5,february:-7,january:-4}; const baseSold={june:-10,may:-20,april:-35,march:-50,february:-65,january:-80};
['june','may','april','march','february','january'].forEach(p=>{defaultAllMonthsData[p]=defaultAllMonthsData.current.map(i=>({...i,qty:Math.max(0,i.qty+(baseQty[p]||0)),soldThisMonth:Math.max(0,i.soldThisMonth+(baseSold[p]||0))}))});
let allMonthsData=JSON.parse(localStorage.getItem('dico_inventory_all')||'null');
if(!allMonthsData){
    allMonthsData = JSON.parse(JSON.stringify(defaultAllMonthsData));
}else{
    // IMPORTANT: Jangan auto-masukkan semula default item yang dah dipadam.
    // Kalau item di-delete, data dalam localStorage dikekalkan exactly macam user punya action.
    Object.keys(defaultAllMonthsData).forEach(p=>{
        if(!allMonthsData[p]) allMonthsData[p]=[];
    });
}
let selectedPeriod=localStorage.getItem('dico_selected_period')||'current';
function saveData(){localStorage.setItem('dico_inventory_all',JSON.stringify(allMonthsData));localStorage.setItem('dico_selected_period',selectedPeriod);localStorage.setItem('dico_inventory',JSON.stringify(allMonthsData[selectedPeriod]||[]))}
function getData(){return allMonthsData[selectedPeriod]||[]}
function imgPath(file){let f=(file&&file.trim())?file.trim():'default_item.jpg';if(f.includes('/')||f.startsWith('http'))return f;return window.location.pathname.includes('/pages/')?'../images/'+f:'images/'+f}
function safeImage(el){el.onerror=null;el.src=window.location.pathname.includes('/pages/')?'../images/default_item.jpg':'images/default_item.jpg'}
function requireLogin(){if(localStorage.getItem('dico_logged_in')!=='true'){document.getElementById('login-page')?.classList.remove('hidden');document.getElementById('main-interface')?.classList.add('hidden')}else{document.getElementById('login-page')?.classList.add('hidden');document.getElementById('main-interface')?.classList.remove('hidden')}}
function login(e){e.preventDefault();const u=document.getElementById('username').value,p=document.getElementById('password').value;if(u==='admin'&&p==='password123'){localStorage.setItem('dico_logged_in','true');requireLogin();initPage()}else document.getElementById('login-error').classList.remove('hidden')}
function logout(){localStorage.removeItem('dico_logged_in');location.href=window.location.pathname.includes('/pages/')?'../index.html':'index.html'}
function toggleMobileMenu(){document.getElementById('mobile-menu').classList.toggle('hidden');document.getElementById('menu-icon').classList.toggle('fa-xmark')}
function changePeriod(v){selectedPeriod=v;saveData();initPage()}
saveData();
</script>
<script>
function initPage(){requireLogin();if(localStorage.getItem('dico_logged_in')!=='true')return;const s=[['Golden Bean Distributors','Kuala Lumpur','Roasted Arabica & espresso beans'],['Sweet Artisan Syrups','Klang, Selangor','Caramel, hazelnut & vanilla syrups'],['Farm Fresh Dairy Solutions','Johor Bahru','Fresh milk, almond milk & oat milk'],["L'Amour Pastries & Bakery",'Subang Jaya','Fresh pastries and flour'],['EcoPack Malaysia Co.','Shah Alam','Paper cups, straws & takeaway trays'],['Borneo Highlands Coffee','Kuching','Specialty coffee beans']];document.getElementById('supplier-grid').innerHTML=s.map(x=>`<div class="glass p-5 rounded-2xl border shadow-sm"><h3 class="font-bold">${x[0]}</h3><p class="text-xs text-stone-500 my-3"><i class="fas fa-location-dot text-amber-700"></i> ${x[1]}</p><p class="text-xs"><b>Supplies:</b> ${x[2]}</p><div class="border-t pt-3 mt-4 text-xs text-stone-500"><i class="fas fa-phone"></i> +60 3-1234 5678</div></div>`).join('')}document.addEventListener('DOMContentLoaded',initPage);
</script></body></html>
